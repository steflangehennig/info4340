<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ site.baseurl }}/" class="site-title">
        <span class="course-num">{{ site.title }}</span>
        <span class="course-name">{{ site.tagline }}</span>
      </a>
      <nav class="site-nav">
        {% for item in site.nav %}
          <a href="{{ site.baseurl }}{{ item.url }}" class="nav-link{% if page.url == item.url %} active{% endif %}">{{ item.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>{{ site.title }} | {{ site.term }} | {{ site.instructor }}</span>
      <span>University of Denver | Daniels College of Business</span>
    </div>
  </footer>

</body>
</html>
